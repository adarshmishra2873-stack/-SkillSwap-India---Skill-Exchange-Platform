<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - SkillSwap</title>
<style>
  body { font-family: sans-serif; background: #0A1628; color: white; text-align: center; padding-top: 5rem; margin: 0; }
  .dashboard { display: none; background: white; color: black; max-width: 600px; margin: 0 auto; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  input { padding: 12px; border-radius: 8px; border: 1px solid #ccc; width: 200px; margin-bottom: 15px; }
  button { padding: 12px 25px; background: #FF6B35; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

  <div id="loginScreen">
    <h2>🔒 Admin Access Only</h2>
    <p style="color: #aaa; margin-bottom: 20px;">SkillSwap Control Panel</p>
    <input type="password" id="adminPass" placeholder="Enter Password"><br>
    <button onclick="checkAdmin()">Secure Login</button>
    <div style="margin-top: 30px;">
      <a href="index.html" style="color: #FF6B35; text-decoration: none;">← Go back to Website</a>
    </div>
  </div>

  <div id="dashboard" class="dashboard">
    <h2>Welcome Boss (Adarsh) 🚀</h2>
    <p>SkillSwap India live status.</p>
    <div style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
      <div style="background: #f4f4f4; padding: 20px; border-radius: 10px; width: 45%;">
        <h3 style="margin: 0; color: #555;">Live Status</h3>
        <h1 style="color: #FF6B35; margin: 10px 0;">Active</h1>
      </div>
      <div style="background: #f4f4f4; padding: 20px; border-radius: 10px; width: 45%;">
        <h3 style="margin: 0; color: #555;">Firebase Db</h3>
        <h1 style="color: #1B6B35; margin: 10px 0;">Connected</h1>
      </div>
    </div>
    <br>
    <a href="index.html" style="display: inline-block; margin-top: 20px; color: red; font-weight: bold; text-decoration: none;">Logout & Return</a>
  </div>

  <script>
    function checkAdmin() {
      let pass = document.getElementById('adminPass').value;
      if (pass === "Ad50") {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      } else {
        alert("Galat Password! Access Denied.");
      }
    }
  </script>

</body>
</html>
