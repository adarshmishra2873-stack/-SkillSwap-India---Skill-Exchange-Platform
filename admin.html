<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Admin Panel - SkillSwap</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; background: #0A1628; color: white; text-align: center; padding-top: 10vh; margin: 0; }
  .container { max-width: 400px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 40px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
  input { padding: 12px; border-radius: 8px; border: none; width: 80%; font-size: 1rem; margin-bottom: 15px; outline: none; text-align: center; }
  button { padding: 12px 24px; background: #FF6B35; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 80%; font-size: 1rem; transition: background 0.3s; }
  button:hover { background: #E85320; }
  .dashboard { display: none; max-width: 800px; margin: 0 auto; text-align: left; padding: 20px; }
  .stat-box { background: white; color: black; padding: 20px; border-radius: 15px; display: inline-block; width: 45%; margin: 10px; box-sizing: border-box; }
</style>
</head>
<body>

  <div id="step1" class="container">
    <h2><img src="https://img.icons8.com/color/48/india.png" alt="IN" style="vertical-align: middle;"> Admin Security</h2>
    <p style="color:#aaa; font-size:0.9rem; margin-bottom:30px;">Verify your Founder identity first.</p>
    <button id="verifyIdentityBtn">Verify via Google</button>
    <br><br><a href="index.html" style="color:#FF6B35; text-decoration:none; font-size:0.9rem;">← Back to Website</a>
  </div>

  <div id="step2" class="container" style="display:none;">
    <h2>Enter Passcode</h2>
    <p style="color:#2ecc71; font-size:0.9rem; margin-bottom:20px;">Identity Verified: Adarsh Mishra</p>
    <input type="password" id="adminPass" placeholder="e.g. Ad50">
    <button onclick="checkFinalPassword()">Unlock Dashboard</button>
  </div>

  <div id="dashboard" class="dashboard">
    <h1 style="color:#FF6B35;">Boss Dashboard 🚀</h1>
    <p>System Status: <span style="color:#2ecc71;">Fully Secured & Active</span></p>
    <div style="display:flex; justify-content:space-between; flex-wrap:wrap; margin-top:30px;">
      <div class="stat-box">
        <h3 style="margin:0; color:#0A1628;">Total App Users</h3>
        <h1 style="color:#FF6B35; margin:10px 0;">Live DB</h1>
      </div>
      <div class="stat-box">
        <h3 style="margin:0; color:#0A1628;">Server Status</h3>
        <h1 style="color:#1B6B35; margin:10px 0;">Healthy</h1>
      </div>
    </div>
    <button style="background:red; width:200px; margin-top:40px;" onclick="location.href='index.html'">Lock & Exit</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCnlFllcoKlSeezpyWoVXb2bvAiU6MW4yI",
      authDomain: "skillswap-india-skill-exchange.firebaseapp.com",
      projectId: "skillswap-india-skill-exchange"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    // YE HAI UNHACKABLE TALA (Aapka Email)
    const adminEmail = "admishra3434@gmail.com"; 

    document.getElementById('verifyIdentityBtn').addEventListener('click', () => {
      signInWithPopup(auth, new GoogleAuthProvider()).then((result) => {
        // Yahan check hoga ki email match kar raha hai ya nahi
        if(result.user.email === adminEmail) {
          document.getElementById('step1').style.display = 'none';
          document.getElementById('step2').style.display = 'block';
        } else {
          alert("SECURITY ALERT: You are not Adarsh! Intruder blocked.");
          auth.signOut();
        }
      }).catch(e => alert("Error linking identity."));
    });
  </script>

  <script>
    function checkFinalPassword() {
      let pass = document.getElementById('adminPass').value;
      if (pass === "Ad50") {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      } else {
        alert("Wrong Password!");
      }
    }
  </script>

</body>
</html>
